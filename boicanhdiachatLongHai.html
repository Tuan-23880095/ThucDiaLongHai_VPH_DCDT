<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bối Cảnh Địa Chất Đệ Tứ Long Hải</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS tuỳ chỉnh tối thiểu để hỗ trợ Tailwind và Chart.js */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #334155; }
        .chart-container { position: relative; width: 100%; max-width: 700px; margin-left: auto; margin-right: auto; height: 320px; max-height: 400px; }
        @media (min-width: 768px) { .chart-container { height: 380px; } }
        
        /* Hiệu ứng tab active */
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { border-bottom: 4px solid #0369a1; color: #0369a1; font-weight: 700; background-color: #f1f5f9; }
        
        /* Hiệu ứng tương tác cho lớp phong hóa */
        .weathering-layer { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .weathering-layer:hover { transform: translateX(10px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .weathering-layer.active-layer { border-left: 8px solid #0f172a; font-weight: bold; }
        
        /* Layout mô phỏng động lực bờ biển */
        .coast-simulator { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; height: 150px; }
        .coast-land { background-color: #fcd34d; border-radius: 8px 0 0 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #78350f; position: relative; overflow: hidden; transition: width 0.5s; }
        .coast-sea { background-color: #bae6fd; border-radius: 0 8px 8px 0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .wave { position: absolute; font-size: 24px; animation: waveMove 3s infinite linear; color: #0284c7; }
        @keyframes waveMove { 0% { right: -20px; opacity: 0; } 50% { opacity: 1; } 100% { right: 100%; opacity: 0; } }
    </style>

    <!-- Chosen Palette: Warm Sand & Ocean Blues -->
    <!-- Application Structure Plan: Ứng dụng được chia thành 4 phần chính tương ứng với chu trình thạch học. Bổ sung Modal (Pop-up) để hiển thị chi tiết thông tin chuyên sâu của các hệ tầng/phức hệ magma khi click. -->
    <!-- Visualization & Content Choices: CSS block diagram (vỏ phong hóa), Radar chart (So sánh trầm tích), Hình ảnh bản đồ/cấu tạo, CSS/JS Animation (Mô phỏng động lực). Modal box. KHÔNG SỬ DỤNG SVG/Mermaid. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white py-6 shadow-md z-10">
        <div class="container mx-auto px-4 max-w-5xl">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Bối Cảnh Địa Chất Đệ Tứ Long Hải</h1>
            <p class="text-slate-300 mt-2 text-sm md:text-base">Khám phá chu trình thạch học đới bờ: Từ kiến tạo móng đá cổ Mesozoi đến động lực học Holocen.</p>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="bg-white shadow-sm sticky top-0 z-20">
        <div class="container mx-auto px-4 max-w-5xl flex flex-wrap" id="nav-tabs">
            <button class="tab-btn active flex-1 py-3 px-2 text-sm md:text-base font-medium text-slate-600 hover:text-sky-700 focus:outline-none" data-target="tab-phonghoa">
                &#9635; 1. Kiến Tạo & Phong Hóa
            </button>
            <button class="tab-btn flex-1 py-3 px-2 text-sm md:text-base font-medium text-slate-600 hover:text-sky-700 focus:outline-none" data-target="tab-tramtich">
                &#9635; 2. Trầm Tích Đệ Tứ
            </button>
            <button class="tab-btn flex-1 py-3 px-2 text-sm md:text-base font-medium text-slate-600 hover:text-sky-700 focus:outline-none" data-target="tab-dongluc">
                &#9635; 3. Động Lực Đới Bờ
            </button>
            <button class="tab-btn flex-1 py-3 px-2 text-sm md:text-base font-medium text-slate-600 hover:text-sky-700 focus:outline-none" data-target="tab-tainguyen">
                &#9635; 4. Tài Nguyên
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl" id="main-content">
        <!-- Content will be injected here by JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-slate-200 py-4 mt-auto border-t border-slate-300">
        <div class="container mx-auto px-4 max-w-5xl text-center text-sm text-slate-600">
            Dữ liệu tổng hợp từ Báo cáo Khảo sát Địa chất Bãi biển Long Hải và khu vực Dinh Cô.
        </div>
    </footer>

    <!-- MODAL ĐỂ HIỂN THỊ CHI TIẾT THÀNH TẠO -->
    <div id="formation-modal" class="fixed inset-0 bg-slate-900 bg-opacity-60 hidden z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-xl">
                <h3 id="modal-title" class="text-xl font-bold text-sky-800">Tiêu đề</h3>
                <button onclick="closeFormationModal()" class="text-slate-400 hover:text-red-500 text-3xl font-bold leading-none">&times;</button>
            </div>
            <div id="modal-content" class="p-6 text-slate-700 text-sm md:text-base space-y-3 overflow-y-auto">
                <!-- Nội dung được tiêm từ JS -->
            </div>
        </div>
    </div>

    <!-- Templates for Tabs -->
    <script type="text/template" id="tpl-phonghoa">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Bối Cảnh Kiến Tạo, Đá Gốc & Phong Hóa</h2>
            <p class="text-slate-600 bg-white p-4 rounded-lg shadow-sm border border-slate-100">
                <strong>Giới thiệu Mục:</strong> Chu trình trầm tích ven bờ Long Hải bắt đầu từ những biến động kiến tạo sâu trong vỏ trái đất và sự phá hủy các khối núi đá magma sát biển. Đặc điểm địa chất khu vực bờ biển Long Hải mang những nét đặc trưng của một <strong>rìa lục địa tích cực</strong>, thể hiện qua sự tương tác phức tạp giữa nền đá gốc magma cổ (phun trào và xâm nhập) và các lớp phủ trầm tích bở rời kỷ Đệ tứ.
            </p>
        </div>

        <!-- KIẾN TẠO VÀ BẢN ĐỒ -->
        <div class="mb-8 bg-white p-6 rounded-xl shadow-md border border-slate-200">
            <h3 class="font-bold text-lg mb-4 text-sky-800 border-b pb-2">1. Bối cảnh đứt gãy và cấu trúc kiến tạo</h3>
            <p class="text-slate-700 mb-4 text-sm md:text-base">Khu vực bãi biển Long Hải nằm trên bình đồ chịu sự chi phối của hệ thống đứt gãy phương Đông Bắc - Tây Nam, tiêu biểu là <strong>đứt gãy Long Hải - Tuy Phong</strong> (hay đứt gãy Cà Ná - Vũng Tàu). Đứt gãy này có độ sâu xuyên vỏ, dốc về phía Đông Nam với góc 70-75°. Dọc theo đứt gãy có các biểu hiện hoạt động kiến tạo rõ rệt trong kỷ Pliocen - Đệ Tứ (sụt hạ đáy biển, trượt thuận - bằng trái).</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-start">
                <div class="md:col-span-2">
                    <img src="https://firebasestorage.googleapis.com/v0/b/link-anh-web.firebasestorage.app/o/VungTau-diachat%20-new02%20copy.jpg?alt=media&token=b051f267-721a-441e-b36e-22617a8754d1" alt="" class="w-full rounded border border-slate-200 object-cover hover:shadow-lg transition cursor-pointer" onclick="window.open(this.src, '_blank')">
                    <p class="text-xs text-center text-slate-500 mt-2 italic">Bản đồ địa chất Vũng Tàu - Long Hải (Click để phóng to)</p>
                </div>
                <div class="md:col-span-1">
                    <img src="https://firebasestorage.googleapis.com/v0/b/link-anh-web.firebasestorage.app/o/ChiDan-in-new.jpg?alt=media&token=f10317ec-8692-47ae-a236-7e91bbca1e56" alt="" class="w-full rounded border border-slate-200 object-cover hover:shadow-lg transition cursor-pointer" onclick="window.open(this.src, '_blank')">
                    <p class="text-xs text-center text-slate-500 mt-2 italic">Bảng chú giải</p>
                </div>
            </div>
        </div>

        <div class="mb-8 bg-white p-6 rounded-xl shadow-md border border-slate-200">
            <h3 class="font-bold text-lg mb-4 text-sky-800 border-b pb-2">2. Đặc điểm nền đá Magma cổ</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Phức hệ Định Quán và Đèo Cả -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 flex flex-col justify-between">
                    <div>
                        <h4 class="font-bold text-slate-800 mb-2 flex items-center gap-2"><span class="text-xl">&#9670;</span> Đá Xâm Nhập (Định Quán & Đèo Cả)</h4>
                        <p class="text-sm text-slate-700 leading-relaxed mb-3">Nền tảng cấu tạo nên các khối núi nổi bật. Thành phần thạch học chủ đạo là <strong>granit biotit</strong> và <strong>granit biotit có hornblend</strong>. Magma tiến hóa thuận từ diorit &rarr; granodiorit &rarr; granit, mang đặc trưng của <strong>granit kiểu I</strong>.</p>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="openFormationModal('dinhquan')" class="px-3 py-1.5 bg-slate-200 hover:bg-sky-100 hover:text-sky-700 text-slate-700 rounded text-xs font-bold transition border border-slate-300">Chi tiết Phức hệ Định Quán</button>
                        <button onclick="openFormationModal('deoca')" class="px-3 py-1.5 bg-slate-200 hover:bg-sky-100 hover:text-sky-700 text-slate-700 rounded text-xs font-bold transition border border-slate-300">Chi tiết Phức hệ Đèo Cả</button>
                    </div>
                </div>

                <!-- Hệ tầng Nha Trang -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 flex flex-col justify-between">
                    <div>
                        <h4 class="font-bold text-slate-800 mb-2 flex items-center gap-2"><span class="text-xl">&#9672;</span> Đá Phun Trào (Hệ tầng Nha Trang)</h4>
                        <p class="text-sm text-slate-700 leading-relaxed mb-3">Sự cộng sinh và đi cùng với các đá phun trào núi lửa lục địa. Tạo nên các cấu trúc địa lũy, mũi đá nhô ra biển (Mũi Dinh Cô) và là nguồn cung cấp vật liệu gốc dồi dào cho các bãi cát trầm tích đới bờ.</p>
                    </div>
                    <div class="mt-2">
                        <button onclick="openFormationModal('nhatrang')" class="px-3 py-1.5 bg-amber-100 hover:bg-amber-200 text-amber-800 rounded text-xs font-bold transition border border-amber-300">Chi tiết Hệ tầng Nha Trang</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            <!-- Mặt cắt tương tác -->
            <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                <h3 class="font-bold text-lg mb-2 text-center text-sky-800">3. Mặt Cắt Vỏ Phong Hóa Từ Đá Gốc</h3>
                <p class="text-xs text-center text-slate-500 mb-4">Click vào từng lớp để xem chi tiết</p>
                <div class="flex flex-col gap-2 relative">
                    <!-- Các lớp từ trên xuống dưới -->
                    <div class="weathering-layer bg-red-800 text-white p-3 rounded shadow" data-info="laterit">
                        <span class="font-bold">Đới Laterit / Đất ngọn</span> (Bề mặt)
                    </div>
                    <div class="weathering-layer bg-orange-600 text-white p-4 rounded shadow" data-info="litoma">
                        <span class="font-bold">Đới Litoma</span>
                    </div>
                    <div class="weathering-layer bg-yellow-600 text-white p-5 rounded shadow" data-info="saprolit">
                        <span class="font-bold">Đới Saprolit</span>
                    </div>
                    <div class="weathering-layer bg-slate-500 text-white p-6 rounded shadow" data-info="bedrock">
                        <span class="font-bold">Đá Gốc Magma Xâm Nhập</span> (Creta muộn - Paleogen)
                    </div>
                </div>
            </div>

            <!-- Khung hiển thị thông tin -->
            <div class="bg-sky-50 p-6 rounded-xl shadow-md border border-sky-100 min-h-[300px] flex flex-col justify-center">
                <div id="weathering-info" class="text-slate-700">
                    <div class="text-center text-4xl mb-4">&#9757;</div>
                    <h3 class="text-xl font-bold text-center text-sky-800 mb-2">Nguồn cung cấp vật liệu</h3>
                    <p class="text-center text-sm">Sườn đá Granite gần biển chính là điểm xuất phát của chu trình trầm tích. Hãy nhấp vào biểu đồ bên cạnh để xem quá trình biến đổi đá gốc thành vật liệu trầm tích đổ ra bãi biển.</p>
                </div>
            </div>
        </div>
    </script>

    <script type="text/template" id="tpl-tramtich">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Đặc Điểm Trầm Tích Tại Bãi Biển Long Hải</h2>
            <p class="text-slate-600 bg-white p-4 rounded-lg shadow-sm border border-slate-100">
                <strong>Giới thiệu Mục:</strong> Bề mặt bãi biển Long Hải cho thấy một hệ thống trầm tích phong phú với cấu trúc mặt cắt phân đới rõ ràng: đới sóng vỗ bờ (swash), thềm đê cát (berm) và hậu bờ (backshore). Đồ thị và hình ảnh dưới đây đi sâu vào các đặc tính hạt và năng lượng môi trường.
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-6">
            <!-- Left Column: Chart & Image 1 -->
            <div class="flex flex-col gap-6">
                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h3 class="font-bold text-lg mb-2 text-center text-sky-800">So Sánh Đặc Tính Trầm Tích Đệ Tứ</h3>
                    <p class="text-xs text-center text-slate-500 mb-4">(Thang điểm 1-10 mô tả tính chất tương đối)</p>
                    <div class="chart-container">
                        <canvas id="sedimentChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h3 class="font-bold text-lg mb-2 text-sky-800">Độ Mài Tròn & Chọn Lọc Của Hạt Cát</h3>
                    <p class="text-sm text-slate-600 mb-3">Cát tại bãi biển Long Hải rất đa dạng (mịn, trung, thô) mang các đặc điểm về độ mài tròn và độ chọn lọc khác nhau tùy thuộc vào phân đới bờ biển.</p>
                    <img src="https://firebasestorage.googleapis.com/v0/b/link-anh-web.firebasestorage.app/o/dau%20tron%20canh.jpg?alt=media&token=8f163971-f78d-488a-bce9-2655f1eee1a9" alt="" class="w-full rounded border border-slate-200 cursor-pointer hover:opacity-90 transition-opacity" onclick="window.open(this.src, '_blank')">
                </div>
            </div>

            <!-- Right Column: Text Information -->
            <div class="flex flex-col gap-4">
                <div class="bg-white p-5 rounded-xl shadow-md border-l-4 border-sky-600">
                    <h4 class="font-bold text-sky-800 text-lg flex items-center gap-2">&#9672; Cấu Trúc Mặt Cắt Bãi Biển</h4>
                    <p class="text-sm mt-2">Bãi biển Long Hải có hệ thống phân đới đặc trưng từ biển vào đất liền:</p>
                    <ul class="list-disc pl-5 mt-2 text-sm space-y-2 text-slate-700">
                        <li><strong>Đới sóng vỗ bờ (Swash zone):</strong> Chịu tác động liên tục của sóng lên và sóng rút. Cát bị xáo trộn mạnh, độ chọn lọc tốt.</li>
                        <li><strong>Thềm đê cát (Berm):</strong> Phần nhô cao hình thành do vật liệu bồi đắp bởi các đợt sóng lớn lúc triều cường.</li>
                        <li><strong>Hậu bờ (Backshore):</strong> Vùng khô ráo nằm phía sau berm, thường chỉ ngập khi có bão lớn, chịu tác động của gió mang vật liệu mịn vào tạo cồn cát.</li>
                    </ul>
                    <img src="https://firebasestorage.googleapis.com/v0/b/link-anh-web.firebasestorage.app/o/cautrucbaibien.jpg?alt=media&token=3967c1dd-5b1a-4918-a229-0fed97ee35fa" alt="" class="w-full rounded mt-4 border border-slate-200 cursor-pointer hover:opacity-90 transition-opacity" onclick="window.open(this.src, '_blank')">
                    <p class="text-xs text-center text-slate-500 mt-2 italic">Mô hình cấu trúc phân đới bãi biển (Click để phóng to)</p>
                </div>

                <div class="bg-white p-5 rounded-xl shadow-md border-l-4 border-amber-500">
                    <h4 class="font-bold text-amber-800 text-lg flex items-center gap-2">&#9672; Năng Lượng Môi Trường & Đặc Điểm Hạt</h4>
                    <p class="text-sm mt-2 text-slate-700 leading-relaxed">
                        Tại một số đới tích tụ vật liệu thô trên bãi biển Long Hải, xuất hiện tập trung dày đặc các <strong>hạt sỏi và mảnh vụn vỏ sò lớn</strong>.<br><br>
                        Sự phân đẳng, độ chọn lọc của vật liệu cùng với việc <strong>vắng bóng hoàn toàn các hạt mịn</strong> là minh chứng rõ nét cho thấy khu vực này chịu tác động của môi trường <strong>năng lượng sóng biển rất cao</strong>, khiến các hạt mịn dễ dàng bị dòng nước cuốn trôi đi nơi khác, chỉ để lại vật liệu thô nặng.
                    </p>
                </div>
            </div>
        </div>

        <!-- BỔ SUNG PHÂN VỊ ĐỊA TẦNG ĐỆ TỨ -->
        <div class="mt-8 bg-white p-6 rounded-xl shadow-md border border-slate-200">
            <h3 class="font-bold text-lg mb-4 text-sky-800 border-b pb-2">Tiến Hóa Trầm Tích Bở Rời Đệ Tứ</h3>
            <p class="text-sm text-slate-700 mb-4">Phủ bất chỉnh hợp lên trên nền đá magma là các trầm tích bở rời Đệ tứ được hình thành qua nhiều chu kỳ thay đổi mực nước biển và hoạt động sông ngòi ven biển. Hệ trầm tích được chia thành các phân vị chính:</p>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="p-4 border-t-4 border-slate-400 bg-slate-50 rounded shadow-sm">
                    <h4 class="font-bold text-slate-800 text-sm">Pleistocene sớm-giữa <br>($Q_1^{1-2}$)</h4>
                    <p class="text-xs text-slate-600 mt-2">Nằm ở phần thấp của mặt cắt, thường bao gồm các tướng cát bùn aluvi và bùn cát sông - biển.</p>
                </div>
                <div class="p-4 border-t-4 border-red-500 bg-red-50 rounded shadow-sm">
                    <h4 class="font-bold text-red-800 text-sm">Cát cổ Hệ tầng Phan Thiết <br>($mQ_1^{2-3}pt$)</h4>
                    <p class="text-xs text-slate-700 mt-2">Tạo đồi cát lượn sóng dọc bờ. Cát hạt trung-mịn màu đỏ, đỏ rượu vang. <strong>94,8% thạch anh bọc màng hematit</strong>. Nguồn gốc gió (eolian), phong hóa mạnh, không chứa vỏ sinh vật.</p>
                </div>
                <div class="p-4 border-t-4 border-amber-400 bg-amber-50 rounded shadow-sm">
                    <h4 class="font-bold text-amber-800 text-sm">Hệ tầng Hàm Tân <br>($mQ_2^{1-2}ht$)</h4>

                    if(target !== appState.currentTab) {
                        // Update active class
                        tabBtns.forEach(b => b.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        // Update state and render
                        appState.currentTab = target;
                        renderTab(target);
                    }

            });

                appState.chartInstance = null;

            const templateId = 'tpl-' + tabId.split('-')[1];
            const template = document.getElementById(templateId);
            
            if (template) {
                mainContent.innerHTML = template.innerHTML;
                
                // Post-render actions based on specific tab
                if(tabId === 'tab-phonghoa') initWeatheringInteraction();

                    {
                        label: 'Holocen (Q2) - Bãi biển hiện đại',
                        data: [2, 8, 9, 8, 1], // Ít hạt mịn do năng lượng sóng cao rửa trôi
                        backgroundColor: 'rgba(2, 132, 199, 0.6)', // Sky blue
                        borderColor: 'rgb(3, 105, 161)',
                        borderWidth: 1
                    }
                ]
            };

            const config = {
                type: 'radar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { display: true },
                            suggestedMin: 0,
                            suggestedMax: 10,
                            ticks: { display: false } 
                        }
                    },
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.raw + '/10';
                                }
                            }
                        }
                    }
                }
            };

            appState.chartInstance = new Chart(ctx, config);
        }

        // --- Tab 3: Coastal Dynamics Simulator Logic ---
        function initCoastSimulator() {
            const btnOpen = document.getElementById('btn-open-beach');
            const btnHeadland = document.getElementById('btn-headland');
            const land = document.getElementById('sim-land');
            const rock = document.getElementById('sim-rock');
            const desc = document.getElementById('sim-description');
            const current = document.getElementById('sim-current');

            btnOpen.addEventListener('click', () => {
                land.style.width = '30%'; // Bãi hẹp, xói lở
                rock.classList.add('hidden');
                current.style.opacity = '1';
                current.style.letterSpacing = '5px'; // Dòng chảy mạnh
                desc.innerHTML = `<strong>Địa hình Bãi Trống:</strong> Không có vật cản, sóng biển và dòng chảy ven bờ tác động mạnh trực tiếp. Năng lượng dòng chảy cao dẫn đến hiện tượng <strong>xói lở bờ biển</strong>, cuốn trôi toàn bộ vật liệu mịn (sét, bột) đi nơi khác.`;
                desc.className = "mt-6 p-4 bg-amber-50 rounded text-sm text-amber-800 border-l-4 border-amber-500 flex-grow";
            });

            btnHeadland.addEventListener('click', () => {
                land.style.width = '60%'; // Bãi rộng, bồi tụ
                rock.classList.remove('hidden');
                current.style.opacity = '0.5';
                current.style.letterSpacing = '1px'; // Dòng chảy bị hãm
                desc.innerHTML = `<strong>Địa hình Mũi Dinh Cô:</strong> Mũi đá nhô ra làm cản trở dòng chảy ven bờ, làm giảm năng lượng môi trường. Hậu quả là vật liệu trầm tích (nhất là vật liệu thô) bị rơi lại và <strong>tích tụ</strong> tạo nên bãi cát rộng. Tại đây lưu giữ các dấu vết <em>gợn sóng (ripple)</em> đặc trưng.`;
                desc.className = "mt-6 p-4 bg-sky-50 rounded text-sm text-sky-800 border-l-4 border-sky-500 flex-grow";
            });
        }

        // Run app on load
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>

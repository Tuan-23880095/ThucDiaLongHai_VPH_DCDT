<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh Giá Cá Nhân - Thực Địa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <div class="bg-purple-600 text-white p-4 flex items-center justify-between sticky top-0 z-10">
            <a href="index.html" class="text-white hover:text-gray-200">← Quay lại</a>
            <h1 class="text-lg font-bold">Thu Hoạch Cá Nhân</h1>
            <div class="w-8"></div>
        </div>

        <div class="p-6">
            <p class="text-sm text-gray-600 mb-4 text-center">Phần đánh giá kỹ năng độc lập của từng sinh viên. Bắt buộc thực hiện.</p>
            
            <form id="individualForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">MSSV:</label>
                        <input type="text" id="mssv" required class="mt-1 w-full p-2 border rounded border-purple-300" placeholder="VD: 23160001">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Họ và Tên:</label>
                        <input type="text" id="hoTen" required class="mt-1 w-full p-2 border rounded border-purple-300" placeholder="Tên SV">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700">Chọn Nội Dung Nộp Bài:</label>
                    <select id="chuDe" class="mt-1 w-full p-2 border rounded border-purple-500 font-bold text-purple-700" onchange="changePrompt()">
                        <option value="ND1">Nội dung 1: Trầm tích đới bờ</option>
                        <option value="ND2">Nội dung 2: Cấu tạo & Động lực</option>
                        <option value="ND3">Nội dung 3: Dòng ven bờ</option>
                        <option value="ND4">Nội dung 4: Vỏ phong hóa</option>
                    </select>
                </div>

                <div id="promptBox" class="bg-purple-50 p-3 rounded border border-purple-200 text-sm text-gray-800">
                    <strong class="text-purple-700">Yêu cầu ND1: Săn tìm vật liệu lạ.</strong><br>
                    Hãy tìm 1 hạt trầm tích/vỏ sò độc đáo nhất. Mô tả đặc điểm (màu, mài tròn) và dự đoán nguồn gốc của nó?
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700">Ghi chú / Kết quả cá nhân của bạn:</label>
                    <textarea id="cauTraLoi" rows="4" required class="mt-1 w-full p-2 border rounded" placeholder="Nhập câu trả lời/số liệu của bạn vào đây..."></textarea>
                </div>

                <div class="bg-gray-50 p-3 rounded border">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">📸 Chụp ảnh minh chứng cá nhân:</label>
                    <input type="file" id="imageInput" accept="image/*" capture="environment" required class="w-full text-sm">
                    <img id="imagePreview" class="mt-3 rounded hidden max-h-48 mx-auto" />
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg shadow-lg hover:bg-purple-700 transition mt-6">
                    📤 Gửi Bài Cá Nhân
                </button>
                <p id="statusMsg" class="text-center text-sm font-semibold mt-2 hidden"></p>
            </form>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwhzcVBWIZDFrx_a-HZNdQfVCOi_IYHok-nItZz2FTon2bkMMtI4g67BcQrA1JDI2jiGQ/exec"; // THAY BẰNG LINK APP SCRIPT CỦA THẦY/CÔ

        // Đổi câu hỏi hướng dẫn tùy theo lựa chọn
        function changePrompt() {
            const chuDe = document.getElementById('chuDe').value;
            const promptBox = document.getElementById('promptBox');
            if(chuDe === "ND1") {
                promptBox.innerHTML = '<strong class="text-purple-700">Yêu cầu ND1: Săn tìm vật liệu lạ.</strong><br>Hãy tìm 1 hạt trầm tích/vỏ sò độc đáo nhất. Mô tả đặc điểm (màu, mài tròn) và dự đoán nguồn gốc của nó?';
            } else if(chuDe === "ND2") {
                promptBox.innerHTML = '<strong class="text-purple-700">Yêu cầu ND2: Đo tần số sóng.</strong><br>Đứng nhìn ra biển và đếm số lượng sóng vỗ bờ trong đúng 1 phút. Tần số là bao nhiêu? Bạn thấy sóng có đều không?';
            } else if(chuDe === "ND3") {
                promptBox.innerHTML = '<strong class="text-purple-700">Yêu cầu ND3: Rác thải sinh thái.</strong><br>Quan sát rác/cành cây dạt trên bãi. Chúng đang dồn về hướng nào? Có khớp với hướng dòng ven bờ nhóm đo không?';
            } else {
                promptBox.innerHTML = '<strong class="text-purple-700">Yêu cầu ND4: Thí nghiệm xúc giác.</strong><br>Bẻ 1 cục đất/đá đới Litoma/Saprolit, miết ra tay. Nó mịn như bột hay nhám sạn? Điều đó chứng tỏ mức độ phong hóa ra sao?';
            }
        }

        let base64Image = "";
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    const scaleSize = 800 / img.width; // Nén nhỏ hơn một chút cho cá nhân
                    canvas.width = 800; canvas.height = img.height * scaleSize;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL("image/jpeg", 0.6);
                    document.getElementById('imagePreview').src = base64Image;
                    document.getElementById('imagePreview').classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('individualForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'), status = document.getElementById('statusMsg');
            btn.disabled = true; btn.innerText = "⏳ Đang gửi...";
            status.classList.remove('hidden'); status.className = "text-center text-sm font-semibold mt-2 text-purple-600";
            status.innerText = "Đang tải lên hệ thống...";

            const chuDeText = document.getElementById('chuDe').options[document.getElementById('chuDe').selectedIndex].text;

            const payload = {
                action: "save_canhan_longhai",
                mssv: document.getElementById('mssv').value,
                hoTen: document.getElementById('hoTen').value,
                chuDe: chuDeText,
                cauTraLoi: document.getElementById('cauTraLoi').value,
                imageBase64: base64Image,
                imageName: "CN_" + document.getElementById('mssv').value + "_" + document.getElementById('chuDe').value + ".jpg"
            };

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
            .then(() => {
                btn.innerText = "✅ Đã nộp thành công!";
                status.className = "text-center text-sm font-semibold mt-2 text-green-600";
                status.innerText = "Điểm của bạn đã được ghi nhận!";
                setTimeout(() => {
                    document.getElementById('cauTraLoi').value = ""; // Chỉ xóa câu trả lời, giữ lại MSSV và tên cho lần nhập sau
                    document.getElementById('imageInput').value = "";
                    document.getElementById('imagePreview').classList.add('hidden');
                    base64Image = ""; btn.disabled = false; btn.innerText = "📤 Gửi Bài Cá Nhân"; status.classList.add('hidden');
                }, 3000);
            }).catch(err => {
                btn.disabled = false; btn.innerText = "❌ Lỗi, nộp lại";
                status.className = "text-center text-sm font-semibold mt-2 text-red-600"; status.innerText = "Vui lòng kiểm tra 4G!";
            });
        });
    </script>
</body>
</html>
